<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
</head>
<body>
  <div class="container">
    <aside>
      <div class="sidebar-header">
        <img src="" alt="">
        <div class="sidebar-header-text">Dashboard</div>
      </div>
      <div class="sidebar-main">
        <div class="sidebar-main-content">
          <img src="" alt="" class="sibebar-main-content-icon">
          <div class="sidebar-main-content-text">Home</div>
        </div>
        <div class="sidebar-main-content">
          <img src="" alt="" class="sibebar-main-content-icon">
          <div class="sidebar-main-content-text">Profile</div>
        </div>
        <div class="sidebar-main-content">
          <img src="" alt="" class="sibebar-main-content-icon">
          <div class="sidebar-main-content-text">Messages</div>
        </div>
        <div class="sidebar-main-content">
          <img src="" alt="" class="sibebar-main-content-icon">
          <div class="sidebar-main-content-text">History</div>
        </div>
        <div class="sidebar-main-content">
          <img src="" alt="" class="sibebar-main-content-icon">
          <div class="sidebar-main-content-text">Tasks</div>
        </div>
        <div class="sidebar-main-content">
          <img src="" alt="" class="sibebar-main-content-icon">
          <div class="sidebar-main-content-text">Communities</div>
        </div>
      </div>
      <div class="sidebar-bottom">
        <div class="sidebar-bottom-content">
          <img src="" alt="" class="sidebar-bottom-content-icon">
          <div sidebar-bottom-content-text=""></div>
        </div>
        <div class="sidebar-bottom-content">
          <img src="" alt="" class="sidebar-bottom-content-icon">
          <div sidebar-bottom-content-text=""></div>
        </div>
        <div class="sidebar-bottom-content">
          <img src="" alt="" class="sidebar-bottom-content-icon">
          <div sidebar-bottom-content-text=""></div>
        </div>
      </div>
    </aside>
    <main>
      <header>
        <div class="header-top">
          <div class="header-top-search-bar">
            <label for="header-search-bar-input"><img src="" alt="" class="header-search-bar-icon"></label>
            <input type="search" id="header-search-bar-input">
          </div>
          <div class="header-top-alarm">
            <img src="" alt="" class="header-top-alarm-icon">
          </div>
          <div class="header-top-profile">
            <img src="" alt="" class="header-top-profile-img">
            <div class="header-top-profile-text">Morgan Oakley</div>
          </div>
        </div>
        <div class="header-bottom">
          <div class="header-bottom-profile">
            <img src="" alt="" class="header-bottom-profile-img">
            <div class="header-bottom-profile-text">
              <span>Hi there,</span>
              <address>Morgan Oakley (@morgan)</address>
            </div>
          </div>
          <div class="header-bottom-buttons">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
          </div>
        </div>
      </header>
      <div class="main-content">

      </div>
    </main>
  </div>
</body>
</html>
